version: '3.8'

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sds-postgrest
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: amacneil/dbmate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migrations:/db/migrations
    environment:
      DATABASE_URL: "postgres://postgres:password@db:5432/sds-postgrest?sslmode=disable"
      DBMATE_NO_DUMP_SCHEMA: "true"
    command: up

  postgrest:
    image: postgrest/postgrest
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://authenticator:password@db:5432/sds-postgrest"
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_LOG_LEVEL: "info"

      PGRST_OPENAPI_MODE: "ignore-privileges"
      PGRST_OPENAPI_SECURITY_ACTIVE: "true"
      PGRST_OPENAPI_SERVER_PROXY_URI: "${PUBLIC_API_URL}/api"

      PGRST_JWT_AUD: "https://sds.app"
      PGRST_JWT_ROLE_CLAIM_KEY: '."https://pgrst.oauth.io/role"'
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_JWT_SECRET_IS_BASE64: "false"

  proxy:
    image: nginx:alpine
    depends_on:
      - postgrest
    ports:
      - "${PROXY_HOST_PORT:-8000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ui:/usr/share/nginx/html

volumes:
  db_data:
